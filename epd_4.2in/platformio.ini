; PlatformIO Project Configuration File
; 项目: ESP8266 + 4.2" B V2 三色墨水屏
;
; 开发环境:
;   OS:      Fedora 44
;   编辑器:  VSCode + PlatformIO IDE 扩展
;   构建工具: pio (pip install --user platformio, 位于 ~/.local/bin/)
;   Python:  3.14 (系统), UV 用于项目级包管理
;   端口:    自动检测 /dev/ttyUSB0 (已安装 udev 规则)

[env:nodemcuv2]
platform = espressif8266
board = nodemcuv2
framework = arduino
board_build.flash_mode = dout
monitor_speed = 115200
upload_speed = 921600

; 手动指定端口 (通常不需要, 自动检测即可)
; upload_port = /dev/ttyUSB0
; monitor_port = /dev/ttyUSB0

; 构建标志
build_flags =
    ; 启用调试输出 (对应 Debug.h 中的 USE_DEBUG)
    -D USE_DEBUG=1
    ; 优化级别, 节省 flash 空间
    -Os

; 可用 WiFi 凭据 (运行时使用, 非编译时)
;   SSID: Redmi_26F0
;   AP后备: EPD-Setup / config123
; lib_deps =
    ; ESP8266 WebServer 等已内置在框架中，无需额外添加
